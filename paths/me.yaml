me:

  get:

    tags:
      - Profile
    summary: Get current profile
    description: Returns information about the authenticated client.
    responses:

      '200':
        description: Current profile

        content:
          application/json:
            schema:
              type: object
              properties:
                client:
                  $ref: '../schemas/client-profile.yaml'
                user:
                  $ref: '../schemas/user-profile.yaml'
                plan:
                  $ref: '../schemas/plan.yaml'
                usage:
                  type: object
                  properties:
                    links:
                      $ref: '../schemas/usage-limit.yaml'
                    api_links:
                      $ref: '../schemas/usage-limit.yaml'

                    mass_links:
                      $ref: '../schemas/usage-limit.yaml'
      '401':
        description: Unauthorized

      '429':
        description: Too many requests
