links:
  get:
    tags:
      - Links
    summary: Get links

    description: Returns a paginated list of links.

    parameters:
      - in: query
        name: limit
        required: false
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
        description: Number of items to return.
      - in: query
        name: from_id
        required: false
        schema:
          type: integer

        description: Cursor for pagination.

      - in: query
        name: created_date_from
        required: false

        schema:
          type: string
          format: date-time

        description: Filter by creation start datetime.

      - in: query
        name: created_date_to
        required: false

        schema:
          type: string
          format: date-time

        description: Filter by creation end datetime.

      - in: query
        name: group_id
        required: false

        schema:
          type: integer

        description: Filter by group

    responses:

      '200':
        description: Links list

        content:
          application/json:

            schema:
              type: object

              properties:

                data:
                  type: array

                  items:
                    $ref: '../schemas/link.yaml'

                meta:
                  $ref: '../schemas/pagination-meta.yaml'

      '401':
        description: Unauthorized

      '429':
        description: Too many requests
  post:

    tags:
      - Links

    summary: Create short link

    description: Create a new short link.

    requestBody:
      required: true

      content:
        application/json:

          schema:
            $ref: '../schemas/link-create-request.yaml'

    responses:

      '200':
        description: Link created successfully

        content:
          application/json:

            schema:
              type: object

              properties:

                data:
                  $ref: '../schemas/link.yaml'
                usage:
                  $ref: '../schemas/usage-limit.yaml'
      '400':
        description: Validation error
        content:
          application/json:
            schema:
              $ref: '../schemas/error.yaml'
      '401':
        description: Unauthorized
      '429':
        description: Too many requests
linkById:
  get:
    tags:
      - Links
    summary: Get link
    description: Returns a single link by ID.
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer
        description: Link ID.
    responses:
      '200':
        description: Link details
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  $ref: '../schemas/link.yaml'
      '401':
        description: Unauthorized
      '404':
        description: Link not found
      '429':
        description: Too many requests
  patch:
    tags:
      - Links
    summary: Update link
    description: Update an existing link.
    parameters:
      - in: path
        name: id
        required: true

        schema:
          type: integer
        description: Link ID.
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../schemas/link-update-request.yaml'
    responses:
      '200':
        description: Link updated successfully
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  $ref: '../schemas/link.yaml'
                usage:
                  $ref: '../schemas/usage-limit.yaml'
      '400':
        description: Validation error
        content:
          application/json:
            schema:
              $ref: '../schemas/error.yaml'
      '401':
        description: Unauthorized
      '404':
        description: Link not found
      '429':
        description: Too many requests
  delete:
    tags:
      - Links
    summary: Delete link
    description: Delete a link by ID.
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer
        description: Link ID.
    responses:
      '200':
        description: Link deleted successfully
      '401':
        description: Unauthorized
      '404':
        description: Link not found
      '429':
        description: Too many requests
