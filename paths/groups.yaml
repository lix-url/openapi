groups:
  get:
    tags:
      - Groups
    summary: Get groups
    description: Returns a list of groups.
    parameters:
      - in: query
        name: limit
        required: false

        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100

        description: Number of items to return.

      - in: query
        name: from_id
        required: false

        schema:
          type: integer

        description: Cursor for pagination.
    responses:
      '200':
        description: Groups list
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: array
                  items:
                    $ref: '../schemas/group.yaml'
                meta:
                  $ref: '../schemas/pagination-meta.yaml'
      '401':
        description: Unauthorized
      '429':
        description: Too many requests
  post:

    tags:
      - Groups

    summary: Create group

    description: Create a new link group.

    requestBody:
      required: true

      content:
        application/json:

          schema:
            type: object

            required:
              - name

            properties:

              name:
                type: string
                example: Seller group

              description:
                type: string
                nullable: true
                example: Group for seller links

              is_rotate:
                type: boolean
                default: false
                example: false

    responses:

      '201':
        description: Group created successfully

        content:
          application/json:

            schema:
              type: object

              properties:

                data:
                  $ref: '../schemas/group.yaml'

      '400':
        description: Validation error

        content:
          application/json:

            schema:
              $ref: '../schemas/error.yaml'

      '401':
        description: Unauthorized

      '429':
        description: Too many requests
groupById:
  get:
    tags:
      - Groups
    summary: Get group
    description: Returns a single group by ID.
    parameters:
      - in: path
        name: id
        required: true

        schema:
          type: integer

        description: Group ID.

    responses:

      '200':
        description: Group details

        content:
          application/json:

            schema:
              type: object

              properties:

                data:
                  $ref: '../schemas/group.yaml'

      '401':
        description: Unauthorized

      '404':
        description: Group not found

      '429':
        description: Too many requests
  patch:
    tags:
      - Groups
    summary: Update group
    description: Update an existing group.
    parameters:
      - in: path
        name: id
        required: true

        schema:
          type: integer

        description: Group ID.

    requestBody:
      required: true

      content:
        application/json:

          schema:
            type: object

            properties:

              name:
                type: string
                example: Seller group

              description:
                type: string
                nullable: true
                example: Group of links

              is_rotate:
                type: boolean
                example: true

    responses:

      '200':
        description: Group updated successfully

        content:
          application/json:

            schema:
              type: object

              properties:

                data:
                  $ref: '../schemas/group.yaml'

      '400':
        description: Validation error

        content:
          application/json:

            schema:
              $ref: '../schemas/error.yaml'

      '401':
        description: Unauthorized

      '404':
        description: Group not found

      '429':
        description: Too many requests
  delete:
    tags:
      - Groups
    summary: Delete group
    description: Delete a group by ID.
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer
        description: Group ID.
    responses:
      '200':
        description: Group deleted successfully
      '401':
        description: Unauthorized
      '404':
        description: Group not found
      '429':
        description: Too many requests
